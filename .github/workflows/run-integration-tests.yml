name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: crescendo_p4
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Backend setup ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask backend
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/crescendo_p4"
          ANTHROPIC_API_KEY: "test-key"
          SECRET_KEY: "ci-integration-secret"
        run: |
          nohup python run.py > /tmp/flask.log 2>&1 &
          echo "Flask started with PID $!"

      # ── Frontend setup ───────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Start Vite dev server
        working-directory: frontend
        run: |
          nohup npm run dev > /tmp/vite.log 2>&1 &
          echo "Vite started with PID $!"

      # ── Wait for both servers ────────────────────────────────────────────
      - name: Wait for Flask backend to be ready
        run: |
          echo "Waiting for Flask on port 5001..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:5001/api/artists > /dev/null 2>&1; then
              echo "Flask is ready after $i attempts."
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "Flask failed to start after 40 attempts. Server logs:"
              cat /tmp/flask.log
              exit 1
            fi
            echo "Attempt $i/40 — retrying in 3s..."
            sleep 3
          done

      - name: Wait for Vite dev server to be ready
        run: |
          echo "Waiting for Vite on port 5173..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite is ready after $i attempts."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Vite failed to start after 30 attempts. Server logs:"
              cat /tmp/vite.log
              exit 1
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done

      # ── Run Playwright integration tests ─────────────────────────────────
      - name: Run integration tests
        working-directory: frontend
        env:
          BASE_URL: "http://localhost:5173"
        run: npm run test:integration

      # ── Artifacts ────────────────────────────────────────────────────────
      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      - name: Print server logs on failure
        if: failure()
        run: |
          echo "======= Flask Backend Logs ======="
          cat /tmp/flask.log || true
          echo ""
          echo "======= Vite Dev Server Logs ======="
          cat /tmp/vite.log || true
