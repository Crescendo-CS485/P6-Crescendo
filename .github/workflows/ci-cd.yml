name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Tests ─────────────────────────────────────────────────────────────────

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ANTHROPIC_API_KEY: "test-key"
        run: |
          python -m pytest ../tests/ -v \
            --cov=app.models --cov=app.routes \
            --cov-report=term-missing

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build (type-check and bundle)
        working-directory: frontend
        run: npm run build

      - name: Run Jest test suites
        working-directory: frontend
        run: npm test

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: crescendo_p4
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask backend
        working-directory: backend
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/crescendo_p4"
          ANTHROPIC_API_KEY: "test-key"
          SECRET_KEY: "ci-integration-secret"
        run: |
          nohup python run.py > /tmp/flask.log 2>&1 &
          echo "Flask started with PID $!"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: frontend
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Start Vite dev server
        working-directory: frontend
        run: |
          nohup npm run dev > /tmp/vite.log 2>&1 &
          echo "Vite started with PID $!"

      - name: Wait for Flask backend to be ready
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:5001/api/artists > /dev/null 2>&1; then
              echo "Flask is ready after $i attempts."
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "Flask failed to start. Server logs:"
              cat /tmp/flask.log
              exit 1
            fi
            echo "Attempt $i/40 — retrying in 3s..."
            sleep 3
          done

      - name: Wait for Vite dev server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite is ready after $i attempts."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Vite failed to start. Server logs:"
              cat /tmp/vite.log
              exit 1
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done

      - name: Run integration tests
        working-directory: frontend
        env:
          BASE_URL: "http://localhost:5173"
        run: npm run test:integration

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      - name: Print server logs on failure
        if: failure()
        run: |
          echo "======= Flask Backend Logs ======="
          cat /tmp/flask.log || true
          echo ""
          echo "======= Vite Dev Server Logs ======="
          cat /tmp/vite.log || true

  # ── Deployments (main only, after tests pass) ──────────────────────────────

  deploy-lambda:
    name: Deploy Backend to AWS Lambda
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies into package directory
        working-directory: backend
        run: |
          pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all: \
            --target package \
            -r requirements.txt

      - name: Copy app source into package
        working-directory: backend
        run: |
          cp -r app package/app
          cp config.py package/config.py
          cp lambda_handler.py package/lambda_handler.py

      - name: Zip deployment package
        working-directory: backend/package
        run: zip -r ../deployment.zip . -x "*.pyc" -x "*/__pycache__/*"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name crescendo-api \
            --zip-file fileb://backend/deployment.zip

      - name: Wait for Lambda update to complete
        run: |
          aws lambda wait function-updated \
            --function-name crescendo-api
          echo "Lambda deployment successful."
          aws lambda get-function-configuration \
            --function-name crescendo-api \
            --query '{State:State,LastUpdateStatus:LastUpdateStatus}' \
            --output json

      - name: Ensure Lambda tagged Project=Crescendo
        run: |
          aws lambda tag-resource \
            --resource arn:aws:lambda:us-east-1:940482408601:function:crescendo-api \
            --tags Project=Crescendo

  deploy-amplify:
    name: Deploy Frontend to AWS Amplify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [frontend-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get latest Amplify job ID
        id: amplify_job
        run: |
          echo "Waiting for Amplify to pick up the push..."
          sleep 15
          JOB_ID=$(aws amplify list-jobs \
            --app-id d291kg32gzfrfc \
            --branch-name main \
            --max-results 1 \
            --query "jobSummaries[0].jobId" \
            --output text)
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          echo "Tracking Amplify job: $JOB_ID"

      - name: Wait for Amplify deployment to complete
        run: |
          APP_ID="d291kg32gzfrfc"
          BRANCH="main"
          JOB_ID="${{ steps.amplify_job.outputs.job_id }}"

          for i in $(seq 1 40); do
            STATUS=$(aws amplify get-job \
              --app-id "$APP_ID" \
              --branch-name "$BRANCH" \
              --job-id "$JOB_ID" \
              --query "job.summary.status" \
              --output text)

            echo "Attempt $i/40 — status: $STATUS"

            if [ "$STATUS" = "SUCCEED" ]; then
              echo "Amplify deployment succeeded."
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "Amplify deployment ended with status: $STATUS"
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for Amplify deployment."
          exit 1
